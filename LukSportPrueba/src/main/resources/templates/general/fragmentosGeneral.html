<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="UTF-8">
        <title>Fragmentos Generales</title>
    </head>
    <body>

        <header th:fragment="header" class="main-header">
            <div class="top-bar">
                <div class="top-bar-left">
                    <a href="#" class="social-link"><i class="fa-brands fa-facebook-f"></i></a>
                    <a href="#" class="social-link"><i class="fa-brands fa-instagram"></i></a>
                    <a href="#" class="social-link"><i class="fa-regular fa-envelope"></i></a>
                </div>

                <div class="top-bar-right">
                    <a th:href="@{/usuario/acceso}" class="user-link">
                        <i class="fa-solid fa-user"></i>
                    </a>
                </div>
            </div>

            <div class="navbar-custom">
                <div class="navbar-left">
                    <a th:href="@{/}" class="brand">
                        <img th:src="@{/img/logo.png}" alt="Logo Luk Sport Center" class="brand-logo">
                        <span class="brand-text">
                            <span class="brand-white">LUK SPORT</span>
                            <span class="brand-red">CENTER</span>
                        </span>
                    </a>
                </div>

                <nav class="navbar-right">
                    <a th:href="@{/categorias}" class="nav-link">Categorías</a>
                    <a th:href="@{/productos}" class="nav-link">Productos</a>
                    <a th:href="@{/carrito}" class="nav-link">Carrito</a>

                    
                    <a th:if="${session.usuarioSesion != null 
                       and session.usuarioSesion.rol != null 
                       and session.usuarioSesion.rol.idRol == 2}"
                       th:href="@{/admin}"
                       class="nav-link">
                        Administración
                    </a>

                    <a th:if="${session.usuarioSesion != null 
                       and session.usuarioSesion.rol != null 
                       and (session.usuarioSesion.rol.idRol == 2 or session.usuarioSesion.rol.idRol == 3)}"
                       th:href="@{/vendedor}"
                       class="nav-link">
                        Vendedor
                    </a>

                </nav>
            </div>
        </header>

        <footer th:fragment="footer" class="main-footer">
            <div class="footer-container">
                <div class="footer-logo-section">
                    <img th:src="@{/img/logo.png}" alt="Logo Luk Sport Center" class="footer-logo">
                </div>

                <div class="footer-links">
                    <div class="footer-column">
                        <h4>Tienda</h4>
                        <a href="#">Ropa</a>
                        <a href="#">Balones</a>
                        <a href="#">Bolsos</a>
                        <a href="#">Cakzado</a>
                    </div>

                    <div class="footer-column">
                        <h4>Mi cuenta</h4>
                        <a href="#">Mis pedidos</a>
                        <a href="#">Carrito</a>
                        <a href="#">Métodos de pago</a>
                    </div>

                    <div class="footer-column">
                        <h4>Sobre nosotros</h4>
                        <a href="#">Nosotros</a>
                        <a href="#">Opiniones de clientes</a>
                    </div>

                    <div class="footer-column">
                        <h4>Contáctanos</h4>
                        <p>Tel: +506 2450-1122</p>
                        <p>Cel: +506 8888-5544</p>
                        <p>luksportcenter@gmail.com</p>
                        <p>Instagram</p>
                    </div>
                </div>
            </div>
        </footer>

    </body>
</html>
