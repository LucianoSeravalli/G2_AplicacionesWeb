<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Categorías | Luk Sport Center</title>

    <link rel="stylesheet" href="/webjars/bootstrap/5.3.8/css/bootstrap.min.css">
    <link rel="stylesheet" href="/webjars/font-awesome/7.0.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/estilos.css}">
</head>

<body>

<div th:replace="~{general/fragmentosGeneral :: header}"></div>

<main class="main-content">

    <div class="container py-5">

        <h2 class="text-center mb-5">
            <i class="fa-solid fa-layer-group me-2"></i>
            Nuestras Categorías
        </h2>

        <div class="row g-4 justify-content-center">

            <div class="col-md-4" th:each="categoria : ${categorias}">

                <div class="card shadow-lg h-100">

                    <!-- 🔥 IMAGEN SIMPLE (SIN ERRORES) -->
                    <img th:src="${categoria.imagen != null ? categoria.imagen : '/img/logo.png'}"
                         class="card-img-top"
                         style="height:220px; object-fit:cover;"
                         alt="Imagen categoría">

                    <div class="card-body text-center">

                        <h5 th:text="${categoria.nombre}"></h5>

                        <p class="text-muted">Categoría deportiva</p>

                        <a th:href="@{/producto/listado(categoriaId=${categoria.idCategoria})}"
                           class="btn btn-danger w-100">
                            Ver productos
                        </a>

                    </div>

                </div>

            </div>

        </div>

    </div>

</main>

<div th:replace="~{general/fragmentosGeneral :: footer}"></div>

<script src="/webjars/bootstrap/5.3.8/js/bootstrap.bundle.min.js"></script>

</body>
</html>
