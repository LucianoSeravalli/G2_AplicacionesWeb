<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${producto.nombre + ' | Luk Sport Center'}">Detalle Producto</title>

    <link rel="stylesheet" href="/webjars/bootstrap/5.3.8/css/bootstrap.min.css">
    <link rel="stylesheet" href="/webjars/font-awesome/7.0.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/estilos.css}">
    <link rel="stylesheet" th:href="@{/css/producto-detalle.css}">
</head>
<body>

<div th:replace="~{general/fragmentosGeneral :: header}"></div>

<main class="main-content">
    <div class="container py-5">

        <div class="mb-4">
            <a th:href="@{/producto/listado(categoriaId=${producto.categoria.idCategoria})}"
               class="btn btn-outline-secondary">
                <i class="fa-solid fa-arrow-left me-2"></i>Volver a productos
            </a>
        </div>

        <div class="detalle-box">
            <div class="row g-5 align-items-start">

                <!-- IMAGEN -->
                <div class="col-lg-6">
                    <img th:src="${producto.imagen != null ? producto.imagen : '/img/logo.png'}"
                         alt="Imagen del producto"
                         class="detalle-img">
                </div>

                <!-- INFO -->
                <div class="col-lg-6">

                    <h2 class="detalle-titulo mb-3" th:text="${producto.nombre}">Nombre Producto</h2>

                    <div class="mb-3">
                        <span th:if="${producto.cantidadExistencia > 0}" class="detalle-badge stock-ok">
                            <i class="fa-solid fa-circle-check me-1"></i>Disponible
                        </span>

                        <span th:if="${producto.cantidadExistencia == 0}" class="detalle-badge stock-off">
                            <i class="fa-solid fa-circle-xmark me-1"></i>Agotado
                        </span>
                    </div>

                    <div class="detalle-precio mb-3">
                        ₡<span th:text="${#numbers.formatDecimal(producto.precioUnitario, 1, 'COMMA', 2, 'POINT')}">0.00</span>
                    </div>

                    <p class="detalle-descripcion mb-4"
                       th:text="${producto.descripcion != null and !#strings.isEmpty(producto.descripcion) ? producto.descripcion : 'Sin descripción disponible.'}">
                        Descripción del producto
                    </p>

                    <div class="mb-4">
                        <p class="mb-1">
                            <strong>Categoría:</strong>
                            <span th:text="${producto.categoria.nombre}">Categoría</span>
                        </p>

                        <p class="mb-0">
                            <strong>Tipo de producto:</strong>
                            <span th:text="${producto.tieneTalla ? 'Producto con tallas' : 'Producto sin tallas'}">Con tallas</span>
                        </p>
                    </div>

                    <!-- FORMULARIO -->
                    <form th:action="@{/carrito/agregar}" method="post">
                        <input type="hidden" name="idProducto" th:value="${producto.idProducto}">

                        <!-- TALLAS -->
                        <div class="mb-4" th:if="${producto.tieneTalla}">
                            <label class="form-label fw-semibold">Seleccione una talla</label>
                            <select class="form-select" name="idTalla" required>
                                <option value="">Seleccione una talla</option>
                                <option th:each="item : ${tallasDisponibles}"
                                        th:value="${item.talla.idTalla}"
                                        th:text="${item.talla.nombreTalla + ' - Disponibles: ' + item.existencia}">
                                </option>
                            </select>
                        </div>

                        <div class="mb-4" th:if="${!producto.tieneTalla}">
                            <label class="form-label fw-semibold">Presentación</label>
                            <input type="text" class="form-control" value="Este producto no maneja tallas" readonly>

                            <input type="hidden"
                                   name="idTalla"
                                   th:value="${tallaSinTallas != null ? tallaSinTallas.idTalla : ''}">
                        </div>

                        <!-- CANTIDAD -->
                        <div class="mb-4">
                            <label class="form-label fw-semibold">Cantidad</label>
                            <input type="number" class="form-control" name="cantidad" min="1" value="1" required>
                        </div>

                        <!-- ENTREGA -->
                        <div class="tipo-entrega-box mb-4">
                            <label class="form-label fw-semibold d-block mb-3">¿Cómo desea recibir su pedido?</label>

                            <div class="form-check mb-2">
                                <input class="form-check-input" type="radio" name="tipoEntrega" id="paqueteria"
                                       value="paqueteria" required>
                                <label class="form-check-label" for="paqueteria">
                                    Envío a domicilio por paquetería
                                </label>
                            </div>

                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="tipoEntrega" id="tienda"
                                       value="retiro_tienda" required>
                                <label class="form-check-label" for="tienda">
                                    Recoger en tienda
                                </label>
                            </div>
                        </div>

                        <!-- MENSAJES -->
                        <div th:if="${error != null}" class="alert alert-danger">
                            <span th:text="${error}"></span>
                        </div>

                        <div th:if="${mensaje != null}" class="alert alert-success">
                            <span th:text="${mensaje}"></span>
                        </div>

                        <!-- BOTON -->
                        <button th:if="${producto.cantidadExistencia > 0}"
                                type="submit"
                                class="btn btn-danger btn-lg w-100">
                            <i class="fa-solid fa-cart-plus me-2"></i>Agregar al carrito
                        </button>

                        <button th:if="${producto.cantidadExistencia == 0}"
                                type="button"
                                class="btn btn-secondary btn-lg w-100"
                                disabled>
                            Producto agotado
                        </button>
                    </form>

                </div>
            </div>
        </div>

    </div>
</main>

<div th:replace="~{general/fragmentosGeneral :: footer}"></div>

<script src="/webjars/bootstrap/5.3.8/js/bootstrap.bundle.min.js"></script>
</body>
</html>
