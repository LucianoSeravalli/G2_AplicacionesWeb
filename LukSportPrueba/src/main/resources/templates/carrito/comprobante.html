<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="UTF-8">
        <title>Comprobante | Luk Sport Center</title>
        <link rel="stylesheet" href="/webjars/bootstrap/5.3.8/css/bootstrap.min.css">
        <link rel="stylesheet" href="/webjars/font-awesome/7.0.0/css/all.min.css">
        <link rel="stylesheet" th:href="@{/css/estilos.css}">
        <link rel="stylesheet" th:href="@{/css/carrito.css}">
    </head>
    <body>
        <div th:replace="~{general/fragmentosGeneral :: header}"></div>

        <main class="main-content">
            <div class="container py-5">
                <div class="carrito-box">
                    <div class="d-flex justify-content-between align-items-center flex-wrap gap-2 mb-4">
                        <div>
                            <h2 class="carrito-title"><i class="fa-solid fa-file-invoice me-2"></i>Comprobante de pedido</h2>
                            <p class="carrito-text mb-0">
                                Pedido #<span th:text="${pedido.idPedido}">1</span>
                            </p>
                        </div>

                        <a th:href="@{/carrito/historial}" class="btn btn-outline-secondary">Volver al historial</a>
                    </div>

                    <div class="carrito-resumen mb-4">
                        <p class="mb-1"><strong>Estado:</strong> <span th:text="${pedido.estado}">realizado</span></p>
                        <p class="mb-1"><strong>Tipo de entrega:</strong> <span th:text="${pedido.tipoEntrega}">paqueteria</span></p>
                        <p class="mb-0">
                            <strong>Total pagado:</strong>
                            <span class="carrito-total">₡<span th:text="${#numbers.formatDecimal(pedido.total,1,'COMMA',2,'POINT')}">0.00</span></span>
                        </p>
                    </div>

                    <div class="table-responsive">
                        <table class="table table-bordered align-middle carrito-table">
                            <thead>
                                <tr>
                                    <th>Producto</th>
                                    <th>Talla</th>
                                    <th>Cantidad</th>
                                    <th>Precio Unitario</th>
                                    <th>Subtotal</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="item : ${itemsPedido}">
                                    <td th:text="${item.producto.nombre}">Producto</td>
                                    <td th:text="${item.talla != null ? item.talla.nombreTalla : 'N/A'}">Talla</td>
                                    <td th:text="${item.cantidad}">1</td>
                                    <td>₡<span th:text="${#numbers.formatDecimal(item.producto.precioUnitario,1,'COMMA',2,'POINT')}">0.00</span></td>
                                    <td>₡<span th:text="${#numbers.formatDecimal(item.producto.precioUnitario * item.cantidad,1,'COMMA',2,'POINT')}">0.00</span></td>
                                </tr>
                            </tbody>
                        </table>
                    </div>

                </div>
            </div>
        </main>

        <div th:replace="~{general/fragmentosGeneral :: footer}"></div>
        <script src="/webjars/bootstrap/5.3.8/js/bootstrap.bundle.min.js"></script>
    </body>
</html>
