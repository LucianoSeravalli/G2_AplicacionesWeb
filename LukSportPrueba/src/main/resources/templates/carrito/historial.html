<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="UTF-8">
        <title>Historial | Luk Sport Center</title>
        <link rel="stylesheet" href="/webjars/bootstrap/5.3.8/css/bootstrap.min.css">
        <link rel="stylesheet" href="/webjars/font-awesome/7.0.0/css/all.min.css">
        <link rel="stylesheet" th:href="@{/css/estilos.css}">
        <link rel="stylesheet" th:href="@{/css/carrito.css}">
    </head>
    <body>
        <div th:replace="~{general/fragmentosGeneral :: header}"></div>

        <main class="main-content">
            <div class="container py-5">
                <div class="carrito-box">
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <h2 class="carrito-title"><i class="fa-solid fa-clock-rotate-left me-2"></i>Historial de pedidos</h2>
                        <a th:href="@{/carrito}" class="btn btn-outline-secondary">Volver al carrito</a>
                    </div>

                    <div th:if="${#lists.isEmpty(pedidos)}" class="alert alert-light border text-center">
                        No tienes pedidos realizados.
                    </div>

                    <div th:if="${!#lists.isEmpty(pedidos)}" class="table-responsive">
                        <table class="table table-bordered align-middle carrito-table">
                            <thead>
                                <tr>
                                    <th>ID Pedido</th>
                                    <th>Entrega</th>
                                    <th>Total</th>
                                    <th>Estado</th>
                                    <th>Acción</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="pedido : ${pedidos}">
                                    <td th:text="${pedido.idPedido}">1</td>
                                    <td th:text="${pedido.tipoEntrega}">paqueteria</td>
                                    <td>₡<span th:text="${#numbers.formatDecimal(pedido.total,1,'COMMA',2,'POINT')}">0.00</span></td>
                                    <td th:text="${pedido.estado}">realizado</td>
                                    <td>
                                        <a th:href="@{/carrito/comprobante/{id}(id=${pedido.idPedido})}"
                                           class="btn btn-outline-primary btn-sm">
                                            Ver comprobante
                                        </a>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>

        <div th:replace="~{general/fragmentosGeneral :: footer}"></div>
        <script src="/webjars/bootstrap/5.3.8/js/bootstrap.bundle.min.js"></script>
    </body>
</html>
